<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Imágenes 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
    overflow-x:hidden;
}

/* HEADER */

header{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px 20px;
    animation:fadeIn 1.5s ease;
}

header h1{
    font-size:4rem;
    margin-bottom:20px;
}

header p{
    max-width:750px;
    font-size:1.3rem;
    line-height:1.8;
}

.btn{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff4b5c;
    font-weight:bold;
    cursor:pointer;
    font-size:1rem;
    transition:0.3s;
}

.btn:hover{
    background:#ff4b5c;
    color:white;
    transform:scale(1.05);
}

/* SECCIONES */

section{
    max-width:1400px;
    margin:70px auto;
    padding:80px 30px;
    border-radius:30px;
    background:white;
    color:#333;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

section::before{
    content:"💖";
    display:block;
    text-align:center;
    font-size:25px;
    margin-bottom:20px;
    opacity:0.6;
}

h2{
    text-align:center;
    color:#ff4b5c;
    margin-bottom:40px;
    font-size:2.3rem;
}

/* GALERÍA */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

/* TARJETAS */

.image-card{
    position:relative;
    overflow:hidden;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    transform:translateY(40px);
    opacity:0;
    transition:all 0.8s cubic-bezier(0.25,1,0.5,1);
}

.image-card.visible{
    transform:translateY(0);
    opacity:1;
}

.image-card img{
    width:100%;
    height:450px;
    object-fit:cover;
    transition:transform 0.7s ease;
}

.image-card:hover img{
    transform:scale(1.08);
}

/* OVERLAY */

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
    display:flex;
    align-items:flex-end;
    padding:25px;
}

.overlay p{
    color:white;
    font-size:1.1rem;
    line-height:1.5;
}

/* BOTÓN VOLVER */

.back-container{
    text-align:center;
    margin-top:50px;
}

.back-btn{
    text-decoration:none;
    background:#ff4b5c;
    color:white;
    padding:15px 35px;
    border-radius:40px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:#ff7585;
    transform:scale(1.05);
}

/* CORAZONES */

.heart{
    position:fixed;
    font-size:20px;
    opacity:0.7;
    animation:float 6s linear infinite;
    pointer-events:none;
}

/* ANIMACIONES */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<header>

    <h1>Mis imágenes favoritas 💖</h1>

    <p>
        Cada una de estas imágenes guarda un sentimiento,
        un recuerdo o una emoción que me hace pensar en ti,
        Kathy… porque incluso en los pequeños detalles,
        siempre encuentro una razón para amarte más 💕
    </p>

    <button class="btn" onclick="irGaleria()">
        Ver galería ✨
    </button>

</header>

<section id="galeria">

    <h2>Nuestra galería especial 📸</h2>

    <div class="gallery" id="gallery">
    </div>

    <div class="back-container">
        <a href="../index.html" class="back-btn">
            Volver al inicio 💌
        </a>
    </div>

</section>

<script>

/* SCROLL SUAVE */
function irGaleria(){
    document.getElementById('galeria').scrollIntoView({
        behavior:'smooth'
    });
}

/* CONFIGURACIÓN */
const extensiones = ['png'];
const mensajePorDefecto = "Eres el amor más hermoso que ha llegado a mi vida 💖";
const LIMITE_FOTOS = 100;

/* LEER DESCRIPCIÓN DESDE Texto/FotoX.txt */
async function obtenerDescripcion(numeroFoto) {
    const rutaTexto = `Texto/Foto${numeroFoto}.txt`;

    try {
        const respuesta = await fetch(rutaTexto, { cache: 'no-cache' });

        if (!respuesta.ok) {
            return mensajePorDefecto;
        }

        const texto = await respuesta.text();
        return texto.trim() || mensajePorDefecto;

    } catch (error) {
        return mensajePorDefecto;
    }
}

/* VERIFICAR SI UNA IMAGEN EXISTE */
function verificarImagen(rutaImagen) {
    return new Promise(resolve => {
        const img = new Image();

        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);

        img.src = rutaImagen;
    });
}

/* CREAR UNA TARJETA */
function crearCard(rutaImagen, numeroFoto, descripcion) {
    const card = document.createElement('div');
    card.className = 'image-card';

    card.innerHTML = `
        <img src="${rutaImagen}" alt="Foto ${numeroFoto}" loading="lazy">
        <div class="overlay">
            <p>${descripcion}</p>
        </div>
    `;

    return card;
}

/* CREAR GALERÍA MÁS RÁPIDA */
async function crearGaleria() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';

    const fragment = document.createDocumentFragment();

    // Crear todas las tareas en paralelo
    const tareas = [];

    for (let numeroFoto = 1; numeroFoto <= LIMITE_FOTOS; numeroFoto++) {
        const rutaImagen = `Galeria/Foto${numeroFoto}.png`;

        tareas.push(
            (async () => {
                const existe = await verificarImagen(rutaImagen);

                if (!existe) {
                    return null;
                }

                const descripcion = await obtenerDescripcion(numeroFoto);

                return crearCard(
                    rutaImagen,
                    numeroFoto,
                    descripcion
                );
            })()
        );
    }

    // Esperar a que todas terminen
    const cards = await Promise.all(tareas);

    // Agregar únicamente las tarjetas válidas
    cards.forEach(card => {
        if (card) {
            fragment.appendChild(card);
        }
    });

    // Insertar todo de una sola vez (mucho más rápido)
    gallery.appendChild(fragment);

    // Ejecutar animación
    requestAnimationFrame(() => {
        mostrarCards();
    });
}

/* FADE IN */
function mostrarCards() {
    const cards = document.querySelectorAll('.image-card');
    const trigger = window.innerHeight * 0.85;

    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;

        if (top < trigger) {
            card.classList.add('visible');
        }
    });
}

/* CORAZONES */
function crearCorazon() {
    const heart = document.createElement('div');

    heart.classList.add('heart');
    heart.innerHTML = '💖';

    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

/* INICIALIZACIÓN */
window.addEventListener('load', () => {
    crearGaleria(); // ahora carga mucho más rápido
    mostrarCards();
});

window.addEventListener('scroll', mostrarCards);

/* GENERAR CORAZONES */
setInterval(crearCorazon, 300);

</script>
